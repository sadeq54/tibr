[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ────────────────────────────────────────────────────────────────────
# Security headers (mirrored in next.config.ts; Netlify wins at edge).
# Embed widgets get their own headers in next.config.ts.
# ────────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Conservative CSP — allows our known third parties without breaking app.
    # TradingView, GTM, Binance/Coinbase/Kraken WS, GoldAPI, Yahoo Finance,
    # Stooq, CoinGecko, Arabinvest broker logos.
    # Conservative CSP — allows our known third parties without breaking app.
    # Report-only first to verify nothing breaks; flip to Content-Security-Policy
    # once verified clean in production.
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://*.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://s3.tradingview.com https://*.tradingview.com https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: ; font-src 'self' data:; connect-src 'self' wss://stream.binance.com wss://ws-feed.exchange.coinbase.com wss://ws.kraken.com https://*.binance.com https://*.coinbase.com https://*.kraken.com https://query1.finance.yahoo.com https://stooq.com https://api.coingecko.com https://*.tradingview.com https://www.google-analytics.com https://*.google-analytics.com https://www.googletagmanager.com https://api.indexnow.org; frame-src 'self' https://www.googletagmanager.com https://*.tradingview.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self';"

# HTML cache: edge-cache for 120s, serve stale up to 10 min while revalidating.
# Beats Next's `no-store` default for SEO + edge performance — search bots
# and repeat visitors hit cache, live prices stay <2 min stale (still within
# Bing/Google "fresh" tolerance for live-data pages).
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, s-maxage=120, stale-while-revalidate=600"

# Long-cache static assets (1 year, immutable — content hash in filename)
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Next image optimizer output — 1 year cache (URL params include hash)
[[headers]]
  for = "/_next/image*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Author/static images — 30 days
[[headers]]
  for = "/author/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

# Partytown worker lib — 30 days
[[headers]]
  for = "/~partytown/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

# Stable assets (logos, manifest, icons) — 1 day
[[headers]]
  for = "/appIcone.*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# llms.txt + robots.txt + sitemap.xml — long edge cache, fast SWR
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, s-maxage=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, s-maxage=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, s-maxage=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Static trust pages — content rarely changes. Edge cache 24h, SWR 7d.
# Pushes TTFB to <50ms after first warmup. Tier-1 pages still use 60s/SWR-240s.
[[headers]]
  for = "/about"
  [headers.values]
    Cache-Control = "public, s-maxage=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/en/about"
  [headers.values]
    Cache-Control = "public, s-maxage=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/about/*"
  [headers.values]
    Cache-Control = "public, s-maxage=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/en/about/*"
  [headers.values]
    Cache-Control = "public, s-maxage=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/methodology"
  [headers.values]
    Cache-Control = "public, s-maxage=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/en/methodology"
  [headers.values]
    Cache-Control = "public, s-maxage=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/editorial-standards"
  [headers.values]
    Cache-Control = "public, s-maxage=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/en/editorial-standards"
  [headers.values]
    Cache-Control = "public, s-maxage=86400, stale-while-revalidate=604800"

# /favicon.ico → /appIcone.ico (file lives at non-default path in /public)
[[redirects]]
  from = "/favicon.ico"
  to = "/appIcone.ico"
  status = 200

# ────────────────────────────────────────────────────────────────────
# Staging / deploy-preview noindex — keeps tibers.netlify.app and
# branch-deploy URLs out of search indexes; production overrides this
# via [context.production] below.
# ────────────────────────────────────────────────────────────────────
[context.deploy-preview.environment]
  NEXT_PUBLIC_DEPLOY_CONTEXT = "preview"

[context.branch-deploy.environment]
  NEXT_PUBLIC_DEPLOY_CONTEXT = "branch"

[[context.deploy-preview.headers]]
  for = "/*"
  [context.deploy-preview.headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[context.branch-deploy.headers]]
  for = "/*"
  [context.branch-deploy.headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Production-only: ensure indexable (overrides any inherited X-Robots-Tag).
[context.production.environment]
  NEXT_PUBLIC_DEPLOY_CONTEXT = "production"

# Redirect the staging hostname → production canonical, so any organic
# link to tibers.netlify.app passes equity to goldpricesarabia.com.
[[redirects]]
  from = "https://tibers.netlify.app/*"
  to = "https://goldpricesarabia.com/:splat"
  status = 301
  force = true
